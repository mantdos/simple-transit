<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude 中转站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["ui-sans-serif", "system-ui", "Segoe UI", "Roboto", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --primary: #ea4c89;
      }
      .app-bg {
        background:
          radial-gradient(900px circle at 15% 10%, rgba(0, 166, 255, 0.22), transparent 46%),
          radial-gradient(800px circle at 85% 25%, rgba(195, 105, 255, 0.2), transparent 46%),
          radial-gradient(900px circle at 55% 95%, rgba(255, 69, 144, 0.16), transparent 46%),
          linear-gradient(180deg, #0b1226 0%, #050a16 100%);
      }
      .glass {
        background: rgba(2, 6, 23, 0.55);
        border: 1px solid rgba(148, 163, 184, 0.25);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      .gradient-text {
        background: linear-gradient(90deg, #00a6ff 0%, #c369ff 52.4%, #ff4590 100%);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
      }
      .btn-primary {
        background: linear-gradient(90deg, #00a6ff 0%, #c369ff 52.4%, #ff4590 100%);
      }
      .btn-glass {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .nav-link {
        color: rgb(203 213 225);
        border: 1px solid transparent;
      }
      .nav-link:hover {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.12);
      }
      .nav-link-active {
        color: #ffffff;
        background: rgba(234, 76, 137, 0.14);
        border-color: rgba(234, 76, 137, 0.38);
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-100 antialiased app-bg">
    <header class="sticky top-0 z-50">
      <div class="mx-auto max-w-6xl px-4 py-3">
        <div class="glass rounded-2xl px-4">
          <div class="flex items-center justify-between gap-4">
            <a href="/" class="flex items-center gap-3 py-2">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
                <defs>
                  <linearGradient id="logoGradientHome" x1="0" y1="0" x2="40" y2="40">
                    <stop offset="0%" stop-color="#00a6ff" />
                    <stop offset="100%" stop-color="#ff4590" />
                  </linearGradient>
                </defs>
                <rect width="40" height="40" rx="12" fill="url(#logoGradientHome)" />
                <circle cx="20" cy="20" r="10" fill="rgba(255,255,255,0.18)" />
                <circle cx="20" cy="20" r="4.2" fill="white" />
              </svg>
              <div class="flex flex-col leading-tight">
                <span class="text-sm font-extrabold gradient-text">Claude 中转站</span>
                <span class="text-xs text-slate-400">微欣科技服务</span>
              </div>
            </a>

            <nav class="flex items-center gap-2">
              <a
                href="/"
                class="nav-link-active nav-link inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium transition"
                aria-current="page"
              >
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 10.5 12 3l9 7.5V21a1.5 1.5 0 0 1-1.5 1.5H15v-6H9v6H4.5A1.5 1.5 0 0 1 3 21V10.5z" />
                </svg>
                首页
              </a>
              <a
                href="/tutorial"
                class="nav-link inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium transition"
              >
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M8 9l-3 3 3 3" />
                  <path d="M16 9l3 3-3 3" />
                  <path d="M14 5l-4 14" />
                </svg>
                Claude Code 安装教程
              </a>
              <a
                href="/usage"
                class="nav-link inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium transition"
              >
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M4 19V5" />
                  <path d="M8 19v-8" />
                  <path d="M12 19v-5" />
                  <path d="M16 19V8" />
                  <path d="M20 19v-3" />
                </svg>
                消费查询
              </a>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-14">
      <section class="text-center">
        <div class="mx-auto max-w-3xl">
          <h1 class="text-4xl font-extrabold tracking-tight sm:text-5xl">
            <span class="gradient-text">Claude 中转站</span>
          </h1>
          <p class="mt-4 text-base text-slate-300 sm:text-lg">
            稳定、高效的 AI 编程助手专属中转服务
          </p>

          <div class="mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row">
            <a
              href="/tutorial"
              class="btn-primary inline-flex items-center justify-center rounded-xl px-7 py-3 text-sm font-semibold text-white shadow-lg shadow-pink-500/20 transition hover:opacity-95"
            >
              立即开始
            </a>
            <a
              href="/usage"
              class="btn-glass inline-flex items-center justify-center rounded-xl px-7 py-3 text-sm font-semibold text-slate-100 transition hover:bg-white/10"
            >
              查询余额
            </a>
          </div>
        </div>

        <div class="mt-10 grid gap-4 sm:grid-cols-3">
          <div class="glass rounded-2xl p-5">
            <p class="text-sm font-semibold text-white">稳定中转</p>
            <p class="mt-2 text-sm text-slate-300">降低延迟波动，让编程体验更顺滑。</p>
          </div>
          <div class="glass rounded-2xl p-5">
            <p class="text-sm font-semibold text-white">高效可用</p>
            <p class="mt-2 text-sm text-slate-300">针对开发场景优化，调用更顺畅。</p>
          </div>
          <div class="glass rounded-2xl p-5">
            <p class="text-sm font-semibold text-white">额度透明</p>
            <p class="mt-2 text-sm text-slate-300">随时查询使用情况与剩余额度。</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="mt-8">
      <div class="mx-auto max-w-6xl px-4">
        <div class="glass rounded-2xl p-6">
          <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-[#00a6ff]/30 to-[#ff4590]/30 flex items-center justify-center">
              <span class="text-base font-bold" aria-hidden="true">M</span>
            </div>
            <span class="text-sm font-semibold text-white">微欣科技服务</span>
          </div>
        </div>

        <div class="py-6 text-center text-xs text-slate-400">
          © 2026 微欣科技服务. All rights reserved.
        </div>
      </div>
    </footer>
  </body>
</html>
